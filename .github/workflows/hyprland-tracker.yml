name: Hyprland release tracker

# Checks daily for new Hyprland releases (github.com/hyprwm/Hyprland).
# Opens a tracking issue when a new tag appears since last check.
#
# Hyprland comes via nixpkgs in this config, so a new release usually
# means: wait 1-7 days for nixpkgs-unstable to bump it, then the next
# `flake-update.yml` PR will pull it in. This workflow is the "heads-up".
#
# If you want Hyprland faster (right when upstream releases it), see the
# notes in this file about switching to a direct hyprland flake input.

on:
  schedule:
    - cron: "0 12 * * *"   # daily 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Check Hyprland releases
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Fetch latest release & open issue if new
        uses: actions/github-script@v9
        with:
          script: |
            // 1. Get latest hyprland release
            const { data: releases } = await github.rest.repos.listReleases({
              owner: 'hyprwm', repo: 'Hyprland', per_page: 1,
            });
            const latest = releases[0];
            if (!latest) {
              core.info('No releases found upstream — odd, exiting.');
              return;
            }
            const tag = latest.tag_name;
            const url = latest.html_url;
            const publishedAt = latest.published_at;

            // 2. Has an open issue for this tag already? If yes, skip.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'hyprland-release',
              state: 'open',
            });
            const dup = existing.find(i => i.title.includes(tag));
            if (dup) {
              core.info(`Already tracked: ${dup.html_url}`);
              return;
            }

            // 3. Open new tracking issue
            const body = [
              `## Hyprland \`${tag}\` released`,
              '',
              `- Published: ${publishedAt}`,
              `- Upstream release: ${url}`,
              '',
              '### What this means for us',
              'This config uses Hyprland from `nixpkgs` (via `inputs.nixpkgs` → unstable channel).',
              'A new Hyprland release will propagate to us automatically once nixpkgs-unstable bumps it,',
              'usually within 1-7 days. The next `flake-update.yml` weekly PR will pull it in.',
              '',
              '### If you want it faster',
              'Switch to direct Hyprland flake input:',
              '',
              '```nix',
              '# flake.nix',
              'inputs.hyprland = {',
              '  url = "github:hyprwm/Hyprland";',
              '  inputs.nixpkgs.follows = "nixpkgs";',
              '};',
              '```',
              '',
              'Then in `modules/upstream/home/hyprland/hyprland.nix`:',
              '',
              '```nix',
              '{ inputs, pkgs, ... }: {',
              '  wayland.windowManager.hyprland.package = inputs.hyprland.packages.${pkgs.system}.hyprland;',
              '}',
              '```',
              '',
              '### Close this issue when',
              '- The version is live on your system (`hyprctl version` shows the new tag), OR',
              '- You decided to skip this release',
              '',
              '---',
              '*Automated via `.github/workflows/hyprland-tracker.yml`*',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Hyprland release: ${tag}`,
              body,
              labels: ['hyprland-release', 'automated'],
            });
            core.info(`Created tracking issue for ${tag}`);
